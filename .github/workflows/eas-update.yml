name: EAS Update (Preview)

on:
  push:
    branches:
      - main

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update to preview
        run: eas update --branch preview --non-interactive --message "CI update ${{ github.sha }}"

      - name: Dispatch notify workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "notify-app-update.yml",
              ref: "main",
              inputs: {
                message: "A new preview update is available.",
                platform: "android",
                branch: "preview"
              }
            });
