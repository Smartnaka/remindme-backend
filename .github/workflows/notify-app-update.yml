name: Notify App Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: Notification message
        required: true
        default: A new update is available.
      platform:
        description: Target platform
        required: true
        default: android
      branch:
        description: EAS branch
        required: true
        default: preview

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send update notification to backend
        env:
          API_URL: ${{ secrets.API_URL }}
          APP_ACTIONS_SECRET: ${{ secrets.APP_ACTIONS_SECRET }}
          MESSAGE: ${{ github.event.inputs.message }}
          PLATFORM: ${{ github.event.inputs.platform }}
          BRANCH: ${{ github.event.inputs.branch }}
        run: |
          curl --fail --show-error --silent -X POST "$API_URL/api/notify-app-update" \
            -H "Content-Type: application/json" \
            -H "x-github-actions-secret: $APP_ACTIONS_SECRET" \
            -d "{\"message\":\"$MESSAGE\",\"platform\":\"$PLATFORM\",\"branch\":\"$BRANCH\"}"
